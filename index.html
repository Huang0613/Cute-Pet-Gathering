<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="images/Favicon.png" type="image/png">
    
    <title>萌寵大集合</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🐾 萌寵大集合 🐾</h1>
    </header>

    <div class="btn-container">
    <div class="game-btn" onclick="openGame('animal-merge-game/index.html')">
        <span class="icon">🐼</span>
        <span class="text">動物合成</span>
    </div>

    <div class="game-btn" onclick="openGame('cute-pet-catch/index.html')">
        <span class="icon">🐶</span>
        <span class="text">接住動物</span>
    </div>
    </div>

    <div id="game-overlay">
        <div class="close-bar">
            <button class="back-btn" onclick="closeGame()">⬅ 返回大廳</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // 開啟遊戲的指令
    // 第 38 行到 第 44 行替換為：
    function openGame(gameUrl) {
       const overlay = document.getElementById('game-overlay');
       const frame = document.getElementById('game-frame');
    
    // 步驟 A: 先清空以重置手機瀏覽器的 iframe 狀態
       frame.src = ""; 
    // 步驟 B: 使用 setTimeout 確保瀏覽器完成重置
       setTimeout(() => {
        // 這裡直接傳入相對路徑，讓 Vercel 或 GitHub 自己尋找正確位置
        frame.src = gameUrl; 
        overlay.style.display = 'flex';
        }, 50);
}
        // 關閉遊戲的指令
        function closeGame() {
            const overlay = document.getElementById('game-overlay');
            const frame = document.getElementById('game-frame');
            overlay.style.display = 'none'; // 隱藏彈出層
            frame.src = '';                 // 清空網址（停止遊戲音樂）
        }
    </script>
</body>
</html>
